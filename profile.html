<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvoPay | Profile</title>
    <link rel="stylesheet" href="profile.css">
</head>
<body>

<div class="profile-container">

    <!-- USER CARD -->
    <div class="profile-card">
        <div class="avatar">👤</div>
        <h2>Mohamed Farag</h2>
        <p>mohamed@email.com</p>

        <button class="btn-edit">تعديل الصورة</button>
    </div>

    <!-- INFO -->
    <div class="profile-info">

        <div class="info-box">
            <h3>📋 بيانات الحساب</h3>

            <div class="info-row">
                <span>الاسم:</span>
                <strong>Mohamed Farag</strong>
            </div>

            <div class="info-row">
                <span>البريد:</span>
                <strong>mohamed@email.com</strong>
            </div>

            <div class="info-row">
                <span>رقم الهاتف:</span>
                <strong>01000000000</strong>
            </div>
        </div>

        <!-- STATS -->
        <div class="stats-box">
            <div class="stat">
                <h4>25</h4>
                <p>عدد الفواتير</p>
            </div>

            <div class="stat">
                <h4>15,000 ج.م</h4>
                <p>إجمالي الأرباح</p>
            </div>
        </div>

        <!-- SETTINGS -->
        <div class="settings-box">
            <h3>⚙️ تعديل البيانات</h3>

            <input type="text" placeholder="الاسم الجديد">
            <input type="email" placeholder="البريد الإلكتروني">
            <input type="text" placeholder="رقم الهاتف">

            <button class="btn-save">حفظ التعديلات</button>
        </div>

        <!-- SECURITY -->
        <div class="security-box">
            <h3>🔐 تغيير كلمة المرور</h3>

            <input type="password" placeholder="كلمة المرور الحالية">
            <input type="password" placeholder="كلمة المرور الجديدة">

            <button class="btn-save">تحديث</button>
        </div>

    </div>

</div>

</body>
</html>
